<!-- Bot 2 Purple - antennae stems+balls unioned into single filled paths (no strokes) -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Body left half (C shape, darker) -->
  <path d="M 100 65 A 45 45 0 0 0 100 155 Z" fill="#5c2d91"/>
  <!-- Body right half (lighter) -->
  <path d="M 100 65 A 45 45 0 0 1 100 155 Z" fill="#9b59d0"/>

  <!-- Face screen -->
  <circle cx="100" cy="110" r="32" fill="#ebe2fd"/>

  <!-- Eyes -->
  <circle cx="90" cy="106" r="5" fill="#5c2d91"/>
  <circle cx="110" cy="106" r="5" fill="#5c2d91"/>

  <!-- Happy smile (stroke converted to filled path) -->
  <path d="M 86.72 118.86 Q 100 126 113.28 118.86 L 114.72 121.14 Q 100 130 85.28 121.14 Z" fill="#5c2d91"/>

  <!-- Left antenna: capsule stem drawn first, ball on top (dark stem, light ball) -->
  <path d="M 82.5 50 A 2.5 2.5 0 0 1 87.5 50 L 87.5 68 A 2.5 2.5 0 0 1 82.5 68 Z" fill="#5c2d91"/>
  <circle cx="85" cy="47" r="6" fill="#9b59d0"/>

  <!-- Right antenna (light stem, dark ball) -->
  <path d="M 112.5 50 A 2.5 2.5 0 0 1 117.5 50 L 117.5 68 A 2.5 2.5 0 0 1 112.5 68 Z" fill="#9b59d0"/>
  <circle cx="115" cy="47" r="6" fill="#5c2d91"/>

  <!-- Feet -->
  <circle cx="85" cy="160" r="10" fill="#5c2d91"/>
  <circle cx="115" cy="160" r="10" fill="#9b59d0"/>
</svg>
