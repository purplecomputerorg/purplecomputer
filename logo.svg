<!-- Bot 2 Purple - Round friendly bot with two antennae -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Body left half (C shape, darker) -->
  <path d="M 100 65 A 45 45 0 0 0 100 155 Z" fill="#5c2d91"/>
  <!-- Body right half (lighter) -->
  <path d="M 100 65 A 45 45 0 0 1 100 155 Z" fill="#9b59d0"/>

  <!-- Face screen -->
  <circle cx="100" cy="110" r="32" fill="#ebe2fd"/>

  <!-- Eyes -->
  <circle cx="90" cy="106" r="5" fill="#5c2d91"/>
  <circle cx="110" cy="106" r="5" fill="#5c2d91"/>

  <!-- Happy smile -->
  <path d="M 88 120 Q 100 128 112 120" stroke="#5c2d91" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Two antennae -->
  <line x1="85" y1="68" x2="85" y2="50" stroke="#5c2d91" stroke-width="5" stroke-linecap="round"/>
  <circle cx="85" cy="47" r="6" fill="#9b59d0"/>

  <line x1="115" y1="68" x2="115" y2="50" stroke="#9b59d0" stroke-width="5" stroke-linecap="round"/>
  <circle cx="115" cy="47" r="6" fill="#5c2d91"/>

  <!-- Feet -->
  <circle cx="85" cy="160" r="10" fill="#5c2d91"/>
  <circle cx="115" cy="160" r="10" fill="#9b59d0"/>
</svg>
