# Purple Computer X.Org Configuration
# Forces modesetting driver to avoid I/O port access issues in VMs and modern systems
# Kid-proofed: disables dangerous keyboard shortcuts

Section "ServerFlags"
    Option "AutoAddDevices" "True"
    Option "AutoEnableDevices" "True"
    Option "AutoAddGPU" "True"
    Option "DontZap" "true"
    # DontVTSwitch intentionally unset: Ctrl+Alt+F2 escape hatch to tty2.
EndSection

Section "Device"
    Identifier "modesetting"
    Driver     "modesetting"
    # NOTE: the modesetting driver has NO "TearFree" option (only the intel/
    # amdgpu/ati DDX drivers do), so setting it here is a no-op that just emits
    # an "Option not used" warning. Whole-frame, vsync'd presentation that stops
    # the old-Intel checkerboard comes from the picom compositor instead, started
    # in xinitrc. See guides/intel-display-tuning.md.
EndSection

Section "Screen"
    Identifier "Default Screen"
    Device     "modesetting"
EndSection

Section "ServerLayout"
    Identifier "Default Layout"
    Screen     "Default Screen"
EndSection
