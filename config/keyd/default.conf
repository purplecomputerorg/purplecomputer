# Purple Computer keyd configuration.
#
# Why:
#  - grave/tilde -> Escape: kids reach the top-left corner key more easily
#    than Escape, and this needs to work before Purple starts (rescue shells,
#    boot hangs) so it can't live in Python.
#  - rightalt -> F2: Touch Bar MacBooks have no physical F-keys, so there
#    is no other way to type Ctrl+Alt+F2 to reach tty2 on that hardware.
#
# Format: https://github.com/rvaiya/keyd

[ids]
*

[main]
grave = esc
102nd = esc
rightalt = f2
