# Purple Computer compositor config.
#
# Why a compositor at all: the modesetting X driver has NO TearFree option of
# its own (only the intel/amdgpu/ati DDX drivers do), so partial-damage updates
# get blitted straight to the scanout buffer and old Intel panels flash a
# checkerboard of the old + new frame during transitions. picom composites
# every frame through a vsync'd backbuffer, so the panel only ever scans out a
# complete frame. See guides/intel-display-tuning.md.
#
# This is a minimal vsync-only compositor: no eye-candy, since shadows/fading/
# blur would add their own repaints and GPU load on 10-year-old hardware.

vsync = true;

# CRITICAL: do NOT unredirect fullscreen windows. Alacritty runs fullscreen;
# unredirecting it would hand it straight to the scanout path and bring the
# tearing/checkerboard right back, defeating the whole point.
unredir-if-possible = false;

shadow = false;
fading = false;
backend = "glx";
